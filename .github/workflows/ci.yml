name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this job only builds and tests — it never writes to the
# repo, releases, or the GITHUB_TOKEN-backed APIs. Pin to read-only so a
# compromised dependency can't push commits or mint packages.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      # Third-party actions are pinned to a full commit SHA (not a mutable
      # tag) so a hijacked tag can't silently alter the build. The trailing
      # comment records the human-readable version; bump both together.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          # Pin to a specific Xcode version so a new stable release on the
          # macOS runner can't silently break the build. Bump deliberately.
          xcode-version: "16.2"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: make project

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Verify GitHub Pages assets
        run: |
          test -f docs/index.html         || (echo "ERROR: docs/index.html missing" && exit 1)
          test -s docs/index.html         || (echo "ERROR: docs/index.html is empty" && exit 1)
          test -f docs/favicons/og-app.png || (echo "ERROR: docs/favicons/og-app.png missing" && exit 1)
          test -s docs/favicons/og-app.png || (echo "ERROR: docs/favicons/og-app.png is empty" && exit 1)
          echo "GitHub Pages assets: OK"
